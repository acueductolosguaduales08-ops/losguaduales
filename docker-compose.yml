version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: acueducto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: acueducto_guaduales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - acueducto_pgdata:/var/lib/postgresql/data

volumes:
  acueducto_pgdata:
